<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>दुकान एडमिन पैनल</title>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Yatra+One&display=swap" rel="stylesheet">
<style>
/* ── PREMIUM DARK TOKENS ── */
:root { --bg: #09090b; --surface: #121214; --surface2: #1e1e24; --border: #27272a; --border2: #3f3f46; --text: #ffffff; --text2: #a1a1aa; --text3: #71717a; --pooja: #f59e0b; --kirana: #10b981; --red: #ef4444; --r: 16px; --r-sm: 8px; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Mukta', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.btn { padding: 12px 20px; border-radius: var(--r-sm); font-size: 15px; font-weight: 700; cursor: pointer; border: none; font-family: 'Mukta', sans-serif; transition: 0.2s; }
.btn-primary { background: var(--pooja); color: #000; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border2); }
.btn-success { background: rgba(16,185,129,0.2); color: var(--kirana); border: 1px solid var(--kirana); }
.btn-danger { background: rgba(239, 68, 68, 0.2); color: var(--red); border: 1px solid var(--red); }
.inp { width: 100%; padding: 12px; font-family: 'Mukta', sans-serif; font-size: 15px; border: 1px solid var(--border2); border-radius: var(--r-sm); background: rgba(0,0,0,0.5); color: var(--text); outline: none; transition: 0.3s; }
.inp:focus { border-color: var(--pooja); }

/* LAYOUT */
.admin-layout { display: flex; min-height: 100vh; }
.admin-sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 32px 20px; display: flex; flex-direction: column; gap: 8px; }
.a-nav { padding: 14px 16px; border-radius: var(--r-sm); cursor: pointer; font-weight: 600; font-size: 15px; color: var(--text2); transition: 0.2s; display: flex; align-items: center; gap: 12px; }
.a-nav.on { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border2); }
.admin-main { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }

.admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 32px; margin-bottom: 24px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.fg-col { display: flex; flex-direction: column; gap: 8px; }
.fg-col label { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; }

table { width: 100%; border-collapse: collapse; text-align: left; font-size: 15px; }
th { padding: 16px; border-bottom: 1px solid var(--border); color: var(--text3); font-weight: 700; text-transform: uppercase; font-size: 12px; }
td { padding: 16px; border-bottom: 1px dashed var(--border); vertical-align: middle; }

/* IMAGE UPLOAD */
.img-upload { border: 2px dashed var(--border2); border-radius: var(--r-sm); padding: 32px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; background: rgba(0,0,0,0.3); }
.img-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.img-preview-box { width: 100%; height: 150px; border-radius: var(--r-sm); object-fit: contain; margin-top: 16px; display: none; }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 28px; border-radius: 99px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 9999; }
#toast.show { opacity: 1; }

@media(max-width: 768px){
  .admin-layout { flex-direction: column; }
  .admin-sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 12px; position: fixed; bottom: 0; border-top: 1px solid var(--border); border-right: none; z-index: 100; background: var(--glass); backdrop-filter: blur(20px); align-items: center; gap: 10px; }
  .admin-sidebar h2 { display: none; }
  .a-nav { white-space: nowrap; font-size: 14px; padding: 10px 14px; border-radius: 99px; }
  .admin-main { padding: 24px 16px; padding-bottom: 100px; height: auto; min-height: 100vh; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="admin-layout">
  <div class="admin-sidebar">
    <h2 style="font-family:'Yatra One',cursive; color:#fff; font-size:28px; margin-bottom:24px;">दुकान <span style="color:var(--pooja)">एडमिन</span></h2>
    <div class="a-nav on" onclick="switchTab('orders', this)">🧾 बिल रिक्वेस्ट</div>
    <div class="a-nav" onclick="switchTab('inventory', this)">📦 इन्वेंटरी</div>
    <div class="a-nav" onclick="switchTab('add', this)">➕ सामान जोड़ें</div>
    <div class="a-nav" onclick="switchTab('alerts', this)">🔔 अलर्ट्स</div>
    <div class="a-nav" onclick="switchTab('storefront', this)">🎨 डिज़ाइन / गैलरी</div>
    <div class="a-nav" onclick="switchTab('team', this)">👨‍💼 टीम</div>
    <div class="a-nav" onclick="switchTab('reviews', this)">⭐ रिव्यु</div>
    <div class="a-nav" onclick="switchTab('settings', this)">⚙️ सेटिंग्स</div>
  </div>
  <div class="admin-main">
    <h2 id="tab-title" style="margin-bottom:24px; font-family:'Yatra One',cursive; font-size:32px; color:var(--pooja);">बिल अप्रूवल</h2>
    <div id="admin-content">डाटा लोड हो रहा है...</div>
  </div>
</div>

<div id="toast"></div>

<!-- 🔴 FIREBASE SDK (COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// 🔴 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB40aHh4-hw76BpPrKkGXnFZ46QCnHcI50",
  authDomain: "csc-center-6346b.firebaseapp.com",
  databaseURL: "https://csc-center-6346b-default-rtdb.firebaseio.com",
  projectId: "csc-center-6346b",
  storageBucket: "csc-center-6346b.firebasestorage.app",
  messagingSenderId: "937013565205",
  appId: "1:937013565205:web:e23773b558445cc5bb3b1c"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

var S = { items: [], orders: [], adminSign: '', shopName: '', notifs: [], gallery: [], team: [], reviews: [] };
var tempImg = {}; 
var isFirstLoad = true;

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ==========================================
// 🔴 DATABASE SYNC FUNCTIONS
// ==========================================
function loadDataFromAPI() {
  db.ref('dukan_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      Object.assign(S, data);
      
      // Ensure all arrays are initialized
      S.items = S.items || []; S.orders = S.orders || []; S.notifs = S.notifs || [];
      S.gallery = S.gallery || []; S.team = S.team || []; S.reviews = S.reviews || [];
      
      if(isFirstLoad) {
        let activeBtn = document.querySelector('.a-nav.on');
        switchTab(activeBtn ? activeBtn.getAttribute('onclick').match(/'([^']+)'/)[1] : 'orders', activeBtn);
        isFirstLoad = false;
      } else {
        let activeTab = document.querySelector('.a-nav.on').getAttribute('onclick').match(/'([^']+)'/)[1];
        switchTab(activeTab, document.querySelector('.a-nav.on'));
      }
    }
  });
}
function saveDataToAPI() { db.ref('dukan_data').set(S); }
// ==========================================

function switchTab(tab, btn) {
  document.querySelectorAll('.a-nav').forEach(t=>t.classList.remove('on'));
  if(btn) btn.classList.add('on');
  let ac = $('admin-content');
  
  if(tab === 'orders') {
    $('tab-title').textContent = "आर्डर एवं बिल अप्रूवल";
    let warning = !S.adminSign ? `<div class="admin-card" style="border-color:var(--pooja); color:var(--pooja)">⚠️ चेतावनी: आपने "सिग्नेचर" सेट नहीं किया है। सेटिंग्स में जाकर हस्ताक्षर अपलोड करें।</div>` : ``;
    ac.innerHTML = warning + `<div class="admin-card"><div style="overflow-x:auto;"><table><thead><tr><th>बिल #</th><th>ग्राहक</th><th>बिल राशि</th><th>स्थिति</th><th>एक्शन</th></tr></thead><tbody>` + 
      S.orders.map(o => `<tr><td>#${o.id.toString().slice(-5)}</td><td><b>${esc(o.user)}</b><br><span style="font-size:12px;color:var(--text3)">${o.phone}</span></td><td>₹${o.total}</td><td>${o.status==='pending'?`<span style="color:var(--red)">Pending</span>`:`<span style="color:var(--kirana)">Approved</span>`}</td><td>${o.status==='pending'?`<button class="btn btn-success" style="padding:6px 12px;font-size:14px;" onclick="approveBill(${o.id})">Approve (✓)</button>`:`<button class="btn btn-danger" style="padding:6px 12px;font-size:14px;" onclick="deleteBill(${o.id})">Delete</button>`}</td></tr>`).join('') + `</tbody></table></div></div>`;
  }
  else if(tab === 'inventory') {
    $('tab-title').textContent = "गोदाम / इन्वेंटरी";
    ac.innerHTML = `<div class="admin-card"><div style="overflow-x:auto;"><table><thead><tr><th>सामान</th><th>कीमत</th><th>स्टॉक</th><th>एक्शन</th></tr></thead><tbody>` + 
      S.items.map(i => `<tr><td><b>${esc(i.name)}</b><br><span class="badge" style="background:#333">${i.type}</span></td><td>₹${i.type==='csc'?(+i.govFee+(+i.srvCharge)):i.price}</td><td>${i.type==='csc'?'N/A':i.qty}</td><td><button class="btn btn-danger" style="padding:6px 12px;font-size:14px" onclick="delItem(${i.id})">हटाएं</button></td></tr>`).join('') + `</tbody></table></div></div>`;
  }
  else if(tab === 'add') {
    $('tab-title').textContent = "नया सामान/सर्विस जोड़ें";
    ac.innerHTML = `
      <div class="admin-card" style="max-width: 600px">
        <div class="form-grid"><div class="fg-col"><label>कैटेगरी</label><select id="new-type" class="inp"><option value="kirana">🌾 किराना</option><option value="pooja">🛕 पूजा</option><option value="csc">🏛️ CSC</option></select></div><div class="fg-col"><label>नाम</label><input type="text" id="new-name" class="inp"></div></div>
        <div class="form-grid"><div class="fg-col"><label>कीमत/चार्ज (₹)</label><input type="number" id="new-price" class="inp"></div><div class="fg-col"><label>स्टॉक/सरकारी फीस (₹)</label><input type="number" id="new-qty" class="inp"></div></div>
        <div class="fg-col" style="margin-bottom:20px"><label>विवरण (Description)</label><input type="text" id="new-desc" class="inp"></div>
        <div class="fg-col" style="margin-bottom:24px"><label>फोटो (वैकल्पिक)</label><div class="img-upload" onclick="$('new-file').click()"><div id="img-text-prod">📸 क्लिक करें</div><input type="file" id="new-file" onchange="compressImage(event, 'prod')"><img id="new-preview-prod" class="img-preview-box"></div></div>
        <button class="btn btn-primary" style="width:100%" onclick="saveNewItem()">सेव करें</button>
      </div>`;
  }
  else if(tab === 'alerts') {
    $('tab-title').textContent = "सूचना एवं अलर्ट्स";
    ac.innerHTML = `
      <div class="admin-card" style="max-width: 600px; margin-bottom:20px;">
        <h3 style="margin-bottom:12px">नया अलर्ट जोड़ें</h3>
        <input type="text" id="new-alert" class="inp" placeholder="जैसे: शनिवार को आधार कार्ड का काम होगा..." style="margin-bottom:12px;">
        <button class="btn btn-primary" onclick="addAlert()">अलर्ट पब्लिश करें</button>
      </div>
      <div class="admin-card"><h3 style="margin-bottom:16px">सक्रिय अलर्ट्स</h3>` +
      S.notifs.map((n, i) => `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--surface2); margin-bottom:8px; border-radius:8px;"><span>${esc(n)}</span><button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" onclick="delAlert(${i})">हटाएं</button></div>`).join('') + `</div>`;
  }
  else if(tab === 'storefront') {
    $('tab-title').textContent = "वेबसाइट डिज़ाइन (Storefront)";
    ac.innerHTML = `
      <div class="admin-card" style="max-width: 700px">
        <div class="form-grid"><div class="fg-col"><label>मेन टाइटल (Hero Title)</label><input type="text" id="sf-title" class="inp" value="${esc(S.heroTitle)}"></div><div class="fg-col"><label>सब-टाइटल</label><input type="text" id="sf-sub" class="inp" value="${esc(S.heroSub)}"></div></div>
        <div class="fg-col" style="margin-bottom:20px"><label>दुकान की बैनर फोटो (Hero)</label><div class="img-upload" onclick="$('sf-file').click()"><div id="img-text-hero">📸 बैनर फोटो बदलें</div><input type="file" id="sf-file" onchange="compressImage(event, 'hero')"><img id="new-preview-hero" class="img-preview-box" src="${S.heroImg}" style="${S.heroImg?'display:block':'display:none'}"></div></div>
        <div class="fg-col" style="margin-bottom:20px"><label>चलता हुआ टेक्स्ट (Marquee / Offers)</label><input type="text" id="sf-marq" class="inp" value="${esc(S.marquee)}" placeholder="खाली छोड़ने पर छिप जाएगा"></div>
        <div class="fg-col" style="margin-bottom:20px"><label>हमारे बारे में (About Us)</label><textarea id="sf-abt" class="inp" style="height:80px">${esc(S.aboutTxt)}</textarea></div>
        <div class="form-grid"><div class="fg-col"><label>दुकान का पता</label><input type="text" id="sf-addr" class="inp" value="${esc(S.address)}"></div><div class="fg-col"><label>Google Map लिंक</label><input type="text" id="sf-map" class="inp" value="${esc(S.mapLink)}"></div></div>
        <button class="btn btn-primary" style="width:100%" onclick="saveStorefront()">वेबसाइट अपडेट करें</button>
      </div>
      
      <div class="admin-card" style="max-width: 700px">
        <h3 style="margin-bottom:16px;">दुकान की गैलरी (Gallery Images)</h3>
        <div class="fg-col" style="margin-bottom:20px"><label>नई फोटो जोड़ें</label><div class="img-upload" onclick="$('gal-file').click()"><div id="img-text-gal">📸 गैलरी के लिए फोटो चुनें</div><input type="file" id="gal-file" onchange="compressImage(event, 'gal')"><img id="new-preview-gal" class="img-preview-box"></div><button class="btn btn-outline" style="margin-top:8px" onclick="addGalleryImg()">गैलरी में जोड़ें</button></div>
        <div style="display:flex; gap:12px; overflow-x:auto;">
          ${S.gallery.map((g, i) => `<div style="position:relative; flex-shrink:0;"><img src="${g}" style="width:120px;height:80px;object-fit:cover;border-radius:8px;"><button style="position:absolute;top:4px;right:4px;background:red;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer" onclick="delGalleryImg(${i})">✕</button></div>`).join('')}
        </div>
      </div>`;
  }
  else if(tab === 'team') {
    $('tab-title').textContent = "हमारी टीम (Staff)";
    ac.innerHTML = `
      <div class="admin-card" style="max-width: 600px; margin-bottom:20px">
        <h3 style="margin-bottom:16px">नया सदस्य जोड़ें</h3>
        <div class="form-grid"><div class="fg-col"><label>नाम</label><input type="text" id="t-name" class="inp"></div><div class="fg-col"><label>पद (Role)</label><input type="text" id="t-role" class="inp" placeholder="उदा: मैनेजर"></div></div>
        <div class="fg-col" style="margin-bottom:20px"><label>स्टाफ की फोटो</label><div class="img-upload" style="padding:20px" onclick="$('t-file').click()"><div id="img-text-team">📸 फोटो चुनें</div><input type="file" id="t-file" onchange="compressImage(event, 'team')"><img id="new-preview-team" class="img-preview-box" style="height:100px;width:100px;border-radius:50%;margin:0 auto"></div></div>
        <button class="btn btn-primary" onclick="addTeam()">टीम में जोड़ें</button>
      </div>
      <div class="admin-card"><h3 style="margin-bottom:16px">वर्तमान टीम</h3>` + 
      S.team.map(t => `<div style="display:flex;align-items:center;gap:16px;padding:12px;border:1px solid var(--border);margin-bottom:8px;border-radius:8px"><img src="${t.img}" style="width:50px;height:50px;border-radius:50%;object-fit:cover"><div><div style="font-weight:700">${esc(t.name)}</div><div style="font-size:12px;color:var(--pooja)">${esc(t.role)}</div></div><button class="btn btn-danger" style="margin-left:auto;padding:6px 12px" onclick="delTeam(${t.id})">हटाएं</button></div>`).join('') + `</div>`;
  }
  else if(tab === 'reviews') {
    $('tab-title').textContent = "ग्राहक रिव्यु मैनेजमेंट";
    ac.innerHTML = `<div class="admin-card">` + 
      (S.reviews.length===0 ? "कोई रिव्यु नहीं है।" : S.reviews.map(r => `<div style="border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:12px; display:flex; justify-content:space-between;"><div><div style="color:#fbbf24;font-size:18px;">${"★".repeat(r.rating)}</div><div style="font-weight:bold">${esc(r.name)}</div><div style="font-size:14px;color:var(--text2)">${esc(r.text)}</div></div><button class="btn btn-danger" style="padding:6px 12px;" onclick="delReview(${r.id})">हटाएं</button></div>`).join('')) + `</div>`;
  }
  else if(tab === 'settings') {
    $('tab-title').textContent = "सेटिंग्स (Settings)";
    ac.innerHTML = `
      <div class="admin-card" style="max-width: 600px">
        <div class="form-grid"><div class="fg-col"><label>दुकान का नाम</label><input type="text" id="cfg-sname" class="inp" value="${esc(S.shopName)}"></div><div class="fg-col"><label>उप-नाम (Sub name)</label><input type="text" id="cfg-ssub" class="inp" value="${esc(S.shopSub)}"></div></div>
        <div class="fg-col" style="margin-bottom:20px"><label>कस्टम लोगो (तस्वीर)</label><div class="img-upload" style="padding:16px" onclick="$('logo-file').click()"><div id="img-text-logo">📸 अपना लोगो अपलोड करें</div><input type="file" id="logo-file" onchange="compressImage(event, 'logo')"><img id="new-preview-logo" class="img-preview-box" src="${S.shopLogoImg}" style="${S.shopLogoImg?'display:block;height:60px':'display:none'}"></div><small style="color:var(--text3)">*यदि फोटो नहीं चाहिए, तो नीचे Emoji डालें</small></div>
        <div class="form-grid"><div class="fg-col"><label>लोगो (Emoji)</label><input type="text" id="cfg-slogo" class="inp" value="${esc(S.shopLogo)}"></div><div class="fg-col"><label>WhatsApp नंबर</label><input type="text" id="cfg-phone" class="inp" value="${esc(S.phone)}"></div></div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="saveSettings()">सेटिंग सेव करें</button>
      </div>

      <div class="admin-card" style="max-width: 600px; border-color:var(--pooja)">
        <h3 style="margin-bottom:12px; color:var(--pooja)">एडमिन हस्ताक्षर (Bill Signature)</h3>
        <p style="font-size:13px; color:var(--text2); margin-bottom:16px;">एक सफेद कागज़ पर साइन करके फोटो खींचें। यह पक्के बिल पर छपेगा।</p>
        <div class="img-upload" onclick="$('sign-file').click()"><div id="img-text-sign">✍️ सिग्नेचर फोटो अपलोड करें</div><input type="file" id="sign-file" onchange="compressImage(event, 'sign')"><img id="new-preview-sign" class="img-preview-box" src="${S.adminSign}" style="${S.adminSign?'display:block;height:80px;background:#fff':'display:none'}"></div>
        <button class="btn btn-outline" style="margin-top:16px;" onclick="saveSignature()">सिग्नेचर सेव करें</button>
      </div>`;
  }
}

// Logic Functions
function approveBill(id) { let b = S.orders.find(o=>o.id===id); if(b){ b.status='approved'; saveDataToAPI(); toast("बिल अप्रूव हुआ!"); } }
function deleteBill(id) { if(confirm("डिलीट करें?")){ S.orders = S.orders.filter(o=>o.id!==id); saveDataToAPI(); } }
function delItem(id) { if(confirm("सामान हटाएँ?")){ S.items = S.items.filter(i=>i.id!==id); saveDataToAPI(); } }
function addAlert() { let t = $('new-alert').value.trim(); if(t){ S.notifs.push(t); saveDataToAPI(); toast("अलर्ट जुड़ गया!"); } }
function delAlert(i) { S.notifs.splice(i,1); saveDataToAPI(); }
function delReview(id) { if(confirm("रिव्यु हटाएँ?")){ S.reviews = S.reviews.filter(r=>r.id!==id); saveDataToAPI(); } }
function addGalleryImg() { if(tempImg['gal']) { S.gallery.push(tempImg['gal']); tempImg['gal']=''; saveDataToAPI(); toast("फोटो जुड़ गई!"); } }
function delGalleryImg(i) { S.gallery.splice(i,1); saveDataToAPI(); }
function addTeam() { let n=$('t-name').value.trim(); if(n){ S.team.push({id:Date.now(), name:n, role:$('t-role').value, img:tempImg['team']||'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}); tempImg['team']=''; saveDataToAPI(); toast("स्टाफ जुड़ गया!"); } }
function delTeam(id) { S.team = S.team.filter(t=>t.id!==id); saveDataToAPI(); }

function saveNewItem() {
  let type = $('new-type').value, name = $('new-name').value.trim();
  if(!name) return toast("नाम जरुरी है!");
  let item = { id: Date.now(), type, name, desc: $('new-desc').value.trim(), img: tempImg['prod'] || '' };
  if(type === 'csc') { item.govFee = +$('new-qty').value||0; item.srvCharge = +$('new-price').value||0; item.qty = 999; } 
  else { item.price = +$('new-price').value||0; item.qty = +$('new-qty').value||0; }
  S.items.push(item); tempImg['prod']=''; saveDataToAPI(); toast("सामान जुड़ गया!"); $('new-name').value=''; $('new-price').value=''; $('new-qty').value=''; $('new-desc').value='';
}

function saveStorefront() {
  S.heroTitle = $('sf-title').value; S.heroSub = $('sf-sub').value; S.marquee = $('sf-marq').value;
  S.aboutTxt = $('sf-abt').value; S.address = $('sf-addr').value; S.mapLink = $('sf-map').value;
  if(tempImg['hero']) S.heroImg = tempImg['hero'];
  saveDataToAPI(); toast("वेबसाइट अपडेट हो गई!");
}

function saveSettings() {
  S.shopName = $('cfg-sname').value; S.shopSub = $('cfg-ssub').value; S.shopLogo = $('cfg-slogo').value;
  S.phone = $('cfg-phone').value;
  if(tempImg['logo']) S.shopLogoImg = tempImg['logo'];
  saveDataToAPI(); toast("सेटिंग सेव हो गई!");
}
function saveSignature() { if(tempImg['sign']) { S.adminSign = tempImg['sign']; saveDataToAPI(); toast("सिग्नेचर अपडेट हो गया!"); } else toast("फोटो अपलोड करें!"); }

// Universal Compressor
function compressImage(e, target) {
  let f = e.target.files[0]; if(!f) return;
  let r = new FileReader();
  r.onload = function(ev) {
    let img = new Image();
    img.onload = function() {
      let cv = document.createElement('canvas'); 
      let MAX_WIDTH = (target==='hero'||target==='gal') ? 800 : (target==='team'||target==='logo' ? 250 : 400);
      let w = img.width, h = img.height;
      if(w > h) { if(w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; } } else { if(h > MAX_WIDTH) { w *= MAX_WIDTH / h; h = MAX_WIDTH; } }
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      tempImg[target] = cv.toDataURL('image/jpeg', target==='logo'?0.9:0.6);
      let txtNode = $('img-text-'+target); if(txtNode) txtNode.classList.add('hide');
      let preview = $('new-preview-'+target); preview.src = tempImg[target]; preview.style.display = 'block'; 
      if(target==='sign') preview.style.background = '#fff';
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

loadDataFromAPI(); // App Starts Here
