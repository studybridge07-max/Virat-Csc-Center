<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>डिजिटल दुकान - ग्राहक पैनल</title>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Yatra+One&display=swap" rel="stylesheet">
<style>
/* ── PREMIUM DARK TOKENS ── */
:root { --bg: #09090b; --surface: #121214; --surface2: #1e1e24; --border: #27272a; --border2: #3f3f46; --text: #ffffff; --text2: #a1a1aa; --text3: #71717a; --pooja: #f59e0b; --pooja-l: rgba(245, 158, 11, 0.15); --csc: #3b82f6; --csc-l: rgba(59, 130, 246, 0.15); --kirana: #10b981; --kirana-l: rgba(16, 185, 129, 0.15); --red: #ef4444; --red-l: rgba(239, 68, 68, 0.15); --r: 16px; --r-sm: 8px; --r-pill: 999px; --glass: rgba(18, 18, 20, 0.85); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Mukta', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body::after { content:''; position:fixed; bottom:-20%; right:-10%; width:60vw; height:60vh; background:radial-gradient(circle, var(--pooja-l) 0%, transparent 60%); filter:blur(100px); z-index:-1; pointer-events: none;}
.hide { display: none !important; }
.btn { padding: 12px 24px; border-radius: var(--r-sm); font-size: 16px; font-weight: 700; cursor: pointer; border: none; display: inline-flex; justify-content: center; align-items: center; gap: 8px; }
.btn-primary { background: var(--pooja); color: #000; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border2); }
.inp { width: 100%; padding: 12px 16px; font-family: 'Mukta', sans-serif; font-size: 16px; border: 1px solid var(--border2); border-radius: var(--r-sm); background: rgba(0,0,0,0.5); color: var(--text); outline: none; }
.badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: var(--r-pill); }
.marquee-bar { background: var(--csc); color: #fff; font-weight: 600; font-size: 14px; padding: 6px 0; overflow: hidden; white-space: nowrap; }
.marquee-content { display: inline-block; animation: marquee 15s linear infinite; }
@keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
.navbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 12px 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.brand { font-family: 'Yatra One', cursive; font-size: 24px; display: flex; align-items: center; gap: 8px; }
.brand-icon { font-size: 28px; max-height: 40px; border-radius: 8px; }
.hero-banner { position: relative; width: 100%; height: 280px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(9,9,11,0.4), var(--bg)); }
.hero-content { position: relative; z-index: 2; }
.slogan-text { font-family: 'Yatra One', cursive; font-size: 24px; color: var(--pooja); }
.sub-slogan { font-size: 14px; color: #fff; margin-top: 8px; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px 20px 100px; }
.section-title { font-family: 'Yatra One', cursive; font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-title::before { content: ''; width: 6px; height: 24px; background: var(--pooja); border-radius: 4px; }
.notif-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.alert-box { background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--pooja); padding: 16px; border-radius: 0 var(--r-sm) var(--r-sm) 0; color: #fff; font-weight: 600; }
.cat-filters { display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; padding-bottom: 8px; }
.cat-pill { padding: 10px 20px; border-radius: var(--r-pill); border: 1px solid var(--border2); font-weight: 700; white-space: nowrap; cursor: pointer; }
.cat-pill.on { background: #fff; color: #000; }
.search-inp { width: 100%; padding: 16px 16px 16px 48px; border-radius: var(--r-pill); background: var(--surface); border: 1px solid var(--border); color: #fff; margin-bottom: 24px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
.p-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; display: flex; flex-direction: column; position: relative; }
.p-img { width: 100%; height: 160px; object-fit: cover; }
.p-img-ph { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; background: var(--surface2); font-size: 40px; opacity: 0.5; }
.p-tag { position: absolute; top: 12px; left: 12px; z-index: 2; }
.p-info { padding: 16px; flex: 1; display: flex; flex-direction: column; }
.p-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.p-desc { font-size: 14px; color: var(--text2); margin-bottom: 16px; flex: 1; }
.p-price-row { display: flex; justify-content: space-between; align-items: flex-end; }
.p-price { font-size: 24px; font-weight: 700; color: #fff; }
.add-btn { width: 40px; height: 40px; border-radius: 12px; background: #fff; color: #000; border: none; font-size: 24px; font-weight: 600; cursor: pointer; }
.floating-cart { position: fixed; bottom: 90px; right: 20px; background: var(--pooja); color: #000; padding: 12px 20px; border-radius: var(--r-pill); display: flex; align-items: center; gap: 12px; z-index: 90; cursor: pointer; }
.cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: flex; justify-content: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; }
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-drawer { width: 100%; max-width: 450px; background: var(--surface); height: 100%; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s; }
.cart-overlay.open .cart-drawer { transform: translateX(0); }
.cart-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'Yatra One', cursive; font-size: 24px; color: var(--pooja); }
.cart-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.c-item { display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.02); padding: 12px; border-radius: var(--r-sm); border: 1px solid var(--border); }
.c-ctrl { display: flex; align-items: center; gap: 12px; background: #000; padding: 4px 8px; border-radius: var(--r-sm); }
.c-btn { background: none; border: none; color: var(--text); font-size: 18px; }
.cart-footer { padding: 24px; border-top: 1px solid var(--border); background: var(--bg); display:flex; flex-direction:column; gap:12px; }
.bill-receipt { background: #fff; color: #000; padding: 24px; border-radius: var(--r); margin-bottom: 20px; }
.b-head { text-align: center; border-bottom: 2px dashed #ccc; padding-bottom: 16px; margin-bottom: 16px; }
.b-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
.b-status { font-weight: 800; padding: 4px 12px; border-radius: 4px; display: inline-block; margin-top: 8px; font-size: 12px; }
.status-pending { background: #fee2e2; color: #dc2626; border: 1px solid #f87171; }
.status-approved { background: #dcfce7; color: #16a34a; border: 1px solid #4ade80; }
.b-signature { margin-top: 20px; text-align: right; }
.b-signature img { max-height: 60px; mix-blend-mode: multiply; }
#toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #fff; color: #000; padding: 14px 28px; border-radius: var(--r-pill); font-weight: 700; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@media(min-width: 769px){ .navbar { top: 0; bottom: auto; } .container, footer { padding-bottom: 40px; } .floating-cart { bottom: 30px; } #toast { top: auto; bottom: 30px; transform: translateX(-50%) translateY(20px); } }
</style>
</head>
<body>

<div class="marquee-bar" id="ui-marquee-wrap"><div class="marquee-content" id="ui-marquee"></div></div>

<nav class="navbar">
  <div class="brand"><span id="ui-logo-wrap"></span><div id="ui-shop-name"></div></div>
  <button class="btn btn-outline" style="padding: 6px 12px; font-size: 14px;" onclick="toggleBills()">🧾 मेरे बिल</button>
</nav>

<div class="hero-banner" id="ui-hero-bg">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="slogan-text" id="ui-tagline"></div>
    <div class="sub-slogan" id="ui-subtag"></div>
  </div>
</div>

<main class="container">
  <div id="ui-notifications" class="notif-container" style="margin-top: 20px;"></div>
  <input type="text" id="search-input" class="search-inp" placeholder="सर्च करें (पैन कार्ड, आटा, अगरबत्ती...)" oninput="renderUser()">
  
  <div class="cat-filters">
    <div class="cat-pill on" onclick="filterItems('all', this)">सभी सामग्री</div>
    <div class="cat-pill" onclick="filterItems('csc', this)">🏛️ CSC सर्विस</div>
    <div class="cat-pill" onclick="filterItems('pooja', this)">🛕 पूजा सामग्री</div>
    <div class="cat-pill" onclick="filterItems('kirana', this)">🌾 किराना</div>
  </div>

  <div class="product-grid" id="product-grid"></div>

  <div style="margin-top: 40px;">
    <div class="section-title">दुकान के बारे में</div>
    <div style="background:var(--surface2); padding:20px; border-radius:16px; color:var(--text2)" id="ui-about"></div>
  </div>
</main>

<div class="floating-cart hide" id="floating-cart" onclick="toggleCart()">
  <div style="display:flex; flex-direction:column; line-height:1.1;"><span id="fc-count" style="font-size:13px; font-weight:700">0</span><span id="fc-total" style="font-size:22px; font-weight:800">₹0</span></div>
  <div>🛒</div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this) toggleCart()">
  <div class="cart-drawer">
    <div class="cart-header">आपका कार्ट <button onclick="toggleCart()" style="background:none;border:none;color:white;font-size:20px;">✕</button></div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div style="font-size:20px; font-weight:bold;">कुल: <span id="cart-grand-total" style="color:var(--pooja)">₹0</span></div>
      <button class="btn btn-primary" style="width:100%; padding:14px;" onclick="requestBill()">🧾 पक्का बिल जेनरेट करें</button>
      <button class="btn" style="width:100%; padding:14px; background:#25D366; color:#fff;" onclick="sendOrder()">💬 WhatsApp पर भेजें</button>
    </div>
  </div>
</div>

<div class="cart-overlay" id="bills-overlay" onclick="if(event.target===this) toggleBills()">
  <div class="cart-drawer" style="background:#f4f4f5">
    <div class="cart-header" style="background:var(--surface); color:var(--text)">मेरे बिल <button onclick="toggleBills()" style="background:none;border:none;color:var(--text);font-size:20px;">✕</button></div>
    <div class="cart-items" id="bills-items" style="color:#000;"></div>
  </div>
</div>

<div id="toast"></div>

<!-- 🔴 FIREBASE SDK (COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// 🔴 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB40aHh4-hw76BpPrKkGXnFZ46QCnHcI50",
  authDomain: "csc-center-6346b.firebaseapp.com",
  databaseURL: "https://csc-center-6346b-default-rtdb.firebaseio.com",
  projectId: "csc-center-6346b",
  storageBucket: "csc-center-6346b.firebasestorage.app",
  messagingSenderId: "937013565205",
  appId: "1:937013565205:web:e23773b558445cc5bb3b1c"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

var S = {
  shopName: 'श्री राम', shopSub: 'स्टोर एवं CSC', shopLogo: '🙏', shopLogoImg: '', phone: '910000000000',
  marquee: '🎉 स्वागत है!', heroTitle: 'भानपुर की डिजिटल दुकान', heroSub: 'सब एक जगह!', heroImg: '',
  aboutTxt: '', address: '', adminSign: '',
  items: [], cart: [], orders: [], notifs: []
};

var currentFilter = 'all';

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ==========================================
// 🔴 DATABASE SYNC FUNCTIONS
// ==========================================
function loadDataFromAPI() {
  db.ref('dukan_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      Object.assign(S, data); // अपडेटेड डाटा सर्वर से लें
    } else {
      saveDataToAPI(); // अगर डाटाबेस नया है, तो डिफ़ॉल्ट डाटा डालें
    }
    initUI();
  });
}

function saveDataToAPI() {
  db.ref('dukan_data').set(S);
}
// ==========================================

function initUI() {
  $('ui-logo-wrap').innerHTML = S.shopLogoImg ? `<img src="${S.shopLogoImg}" class="brand-icon">` : `<div class="brand-icon">${S.shopLogo}</div>`;
  $('ui-shop-name').innerHTML = `${esc(S.shopName)} <span style="color:var(--pooja)">${esc(S.shopSub)}</span>`;
  if(S.marquee) { $('ui-marquee-wrap').classList.remove('hide'); $('ui-marquee').textContent = S.marquee; } else { $('ui-marquee-wrap').classList.add('hide'); }
  if(S.heroImg) { $('ui-hero-bg').style.backgroundImage = `url('${S.heroImg}')`; }
  $('ui-tagline').textContent = S.heroTitle; $('ui-subtag').textContent = S.heroSub; $('ui-about').textContent = S.aboutTxt;
  $('ui-notifications').innerHTML = (S.notifs || []).map(n => `<div class="alert-box">🔔 ${esc(n)}</div>`).join('');
  renderUser();
  if($('bills-overlay').classList.contains('open')) renderUserBills(); // Update bills UI if open
}

function renderUser() {
  let term = $('search-input').value.toLowerCase().trim();
  let filtered = currentFilter !== 'all' ? (S.items||[]).filter(i => i.type === currentFilter) : (S.items||[]);
  if(term) filtered = filtered.filter(i => i.name.toLowerCase().includes(term));
  
  $('product-grid').innerHTML = filtered.map(i => {
    let tag = i.type === 'csc' ? `<span class="badge" style="background:var(--csc);color:#fff">🏛️ CSC</span>` : `<span class="badge" style="background:var(--kirana);color:#000">सामान</span>`;
    let price = i.type === 'csc' ? (+i.govFee||0) + (+i.srvCharge||0) : i.price;
    let btnHtml = (i.type !== 'csc' && i.qty <= 0) ? `<div style="color:var(--red)">स्टॉक ख़त्म</div>` : `<button class="add-btn" onclick="addToCart(${i.id}, '${esc(i.name)}', ${price}, '${i.type}')">+</button>`;
    return `<div class="p-card"><div style="position:relative">${i.img?`<img src="${i.img}" class="p-img">`:`<div class="p-img-ph">📦</div>`}<div class="p-tag">${tag}</div></div><div class="p-info"><div class="p-name">${esc(i.name)}</div><div class="p-desc">${esc(i.desc)}</div><div class="p-price-row"><div><div class="p-price">₹${price}</div></div>${btnHtml}</div></div></div>`;
  }).join('') || '<div style="grid-column:1/-1;text-align:center;color:gray">सामान नहीं मिला।</div>';
  updateCartUI();
}

function filterItems(type, btn) { currentFilter = type; document.querySelectorAll('.cat-pill').forEach(t => t.classList.remove('on')); btn.classList.add('on'); renderUser(); }
function toggleCart() { $('cart-overlay').classList.toggle('open'); }
function addToCart(id, name, price, type) {
  S.cart = S.cart || [];
  let exist = S.cart.find(c => c.id === id);
  if(exist) exist.qty++; else S.cart.push({ id, name, price, qty: 1, type });
  toast("कार्ट में जुड़ गया!"); updateCartUI();
}
function updateCartQty(id, delta) {
  let c = S.cart.find(c => c.id === id); if(!c) return;
  c.qty += delta; if(c.qty <= 0) S.cart = S.cart.filter(x => x.id !== id);
  updateCartUI();
}
function updateCartUI() {
  S.cart = S.cart || [];
  let totItems = 0, gTotal = 0;
  $('cart-items').innerHTML = S.cart.map(c => {
    totItems += c.qty; gTotal += (c.price * c.qty);
    return `<div class="c-item"><div style="flex:1;font-weight:bold">${c.name}<div style="color:var(--pooja)">₹${c.price}</div></div><div class="c-ctrl"><button class="c-btn" onclick="updateCartQty(${c.id}, -1)">-</button><span style="font-weight:700;width:24px;text-align:center">${c.qty}</span><button class="c-btn" onclick="updateCartQty(${c.id}, 1)">+</button></div></div>`;
  }).join('') || '<div style="text-align:center;color:gray;margin-top:20px">कार्ट खाली है।</div>';
  
  $('cart-grand-total').textContent = '₹' + gTotal;
  if(totItems > 0) { $('floating-cart').classList.remove('hide'); $('fc-count').textContent = totItems + ' आइटम'; $('fc-total').textContent = '₹' + gTotal; } 
  else { $('floating-cart').classList.add('hide'); $('cart-overlay').classList.remove('open'); }
}

function sendOrder() {
  if(!S.cart || S.cart.length === 0) return;
  let text = "🙏 *नया आर्डर*\n"; let total = 0;
  S.cart.forEach(c => { text += `▪️ ${c.qty}x ${c.name} (₹${c.price * c.qty})\n`; total += (c.price * c.qty); });
  window.open(`https://wa.me/${S.phone}?text=${encodeURIComponent(text + `\n*कुल बिल: ₹${total}*`)}`);
  S.cart = []; updateCartUI(); toggleCart();
}

function requestBill() {
  if(!S.cart || S.cart.length === 0) return;
  let uName = prompt("बिल के लिए अपना नाम दर्ज करें:"); if(!uName) return;
  let phone = prompt("अपना मोबाइल नंबर दर्ज करें (वैकल्पिक):") || "";
  let total = S.cart.reduce((s,c) => s + (c.price * c.qty), 0);
  
  S.orders = S.orders || [];
  let newOrder = { id: Date.now(), date: new Date().toLocaleDateString('hi-IN'), user: uName, phone: phone, items: S.cart, total: total, status: 'pending' };
  S.orders.unshift(newOrder); 
  S.cart = []; updateCartUI(); toggleCart(); 
  
  saveDataToAPI(); // 🔴 Saving back to Firebase
  toast("बिल रिक्वेस्ट भेज दी गई है!"); toggleBills();
}

function toggleBills() { $('bills-overlay').classList.toggle('open'); if($('bills-overlay').classList.contains('open')) renderUserBills(); }

function renderUserBills() {
  S.orders = S.orders || [];
  $('bills-items').innerHTML = S.orders.map(o => {
    let stat = o.status === 'pending' ? `<span class="b-status status-pending">अमान्य (Pending Approval)</span>` : `<span class="b-status status-approved">✓ मान्य (Approved)</span>`;
    let sign = (o.status === 'approved' && S.adminSign) ? `<div class="b-signature"><img src="${S.adminSign}"><p>Authorized Signatory</p></div>` : ``;
    return `<div class="bill-receipt"><div class="b-head"><div style="font-family:'Yatra One',cursive;font-size:20px">${S.shopName}</div></div><div class="b-row"><b>बिल #${o.id.toString().slice(-5)}</b><span>${o.date}</span></div><div class="b-row" style="margin-bottom:12px;color:gray">ग्राहक: ${o.user}</div><div style="border-bottom:1px solid #ccc;padding-bottom:8px;margin-bottom:8px;">${o.items.map(i=>`<div class="b-row"><span>${i.qty}x ${i.name}</span><span>₹${i.price*i.qty}</span></div>`).join('')}</div><div class="b-row" style="font-weight:bold;font-size:18px"><span>कुल:</span><span>₹${o.total}</span></div><div style="text-align:center">${stat}</div>${sign}</div>`;
  }).join('') || '<div style="text-align:center;padding:20px;">कोई बिल नहीं है।</div>';
}

loadDataFromAPI(); // App Starts Here
</script>
</body>
</html>
