<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>डिजिटल दुकान - ग्राहक पैनल</title>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Yatra+One&display=swap" rel="stylesheet">
<style>
/* ── PREMIUM DARK TOKENS ── */
:root { --bg: #09090b; --surface: #121214; --surface2: #1e1e24; --border: #27272a; --border2: #3f3f46; --text: #ffffff; --text2: #a1a1aa; --text3: #71717a; --pooja: #f59e0b; --pooja-l: rgba(245, 158, 11, 0.15); --csc: #3b82f6; --csc-l: rgba(59, 130, 246, 0.15); --kirana: #10b981; --kirana-l: rgba(16, 185, 129, 0.15); --red: #ef4444; --red-l: rgba(239, 68, 68, 0.15); --r: 16px; --r-sm: 8px; --r-pill: 999px; --glass: rgba(18, 18, 20, 0.85); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Mukta', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body::after { content:''; position:fixed; bottom:-20%; right:-10%; width:60vw; height:60vh; background:radial-gradient(circle, var(--pooja-l) 0%, transparent 60%); filter:blur(100px); z-index:-1; pointer-events: none;}
.hide { display: none !important; }
.btn { padding: 12px 24px; border-radius: var(--r-sm); font-size: 16px; font-weight: 700; cursor: pointer; border: none; display: inline-flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; }
.btn-primary { background: var(--pooja); color: #000; box-shadow: 0 4px 15px var(--pooja-l); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border2); }
.inp { width: 100%; padding: 12px 16px; font-family: 'Mukta', sans-serif; font-size: 16px; border: 1px solid var(--border2); border-radius: var(--r-sm); background: rgba(0,0,0,0.5); color: var(--text); outline: none; }
.badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: var(--r-pill); }

/* MARQUEE */
.marquee-bar { background: var(--csc); color: #fff; font-weight: 600; font-size: 14px; padding: 6px 0; overflow: hidden; white-space: nowrap; }
.marquee-content { display: inline-block; animation: marquee 15s linear infinite; }
@keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

/* NAVBAR (TOP) */
.navbar { position: sticky; top: 0; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.brand { font-family: 'Yatra One', cursive; font-size: 24px; display: flex; align-items: center; gap: 8px; }
.brand-icon { font-size: 28px; max-height: 40px; border-radius: 8px; }

/* HERO BANNER */
.hero-banner { position: relative; width: 100%; height: 280px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(9,9,11,0.4), var(--bg)); }
.hero-content { position: relative; z-index: 2; }
.slogan-text { font-family: 'Yatra One', cursive; font-size: 32px; color: var(--pooja); text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
.sub-slogan { font-size: 16px; color: #fff; margin-top: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

/* MAIN CONTENT */
.container { max-width: 1200px; margin: 0 auto; padding: 20px 20px 60px; }
.section-title { font-family: 'Yatra One', cursive; font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-title::before { content: ''; width: 6px; height: 24px; background: var(--pooja); border-radius: 4px; }
.alert-box { background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--pooja); padding: 16px; border-radius: 0 var(--r-sm) var(--r-sm) 0; color: #fff; font-weight: 600; margin-bottom: 12px; }

/* CATEGORY FILTERS (LIKE FLIPKART "FOR YOU, FASHION" ROW) */
.cat-filters { display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; padding-bottom: 8px; }
.cat-pill { padding: 10px 20px; border-radius: var(--r-pill); border: 1px solid var(--border2); font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03); }
.cat-pill.on { background: #fff; color: #000; }
.search-inp { width: 100%; padding: 16px 16px 16px 48px; border-radius: var(--r-pill); background: var(--surface); border: 1px solid var(--border); color: #fff; margin-bottom: 24px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="gray" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>'); background-repeat: no-repeat; background-position: 16px center; }

/* PRODUCTS */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
.p-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; display: flex; flex-direction: column; position: relative; }
.p-img { width: 100%; height: 160px; object-fit: cover; }
.p-img-ph { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; background: var(--surface2); font-size: 40px; opacity: 0.5; }
.p-tag { position: absolute; top: 12px; left: 12px; z-index: 2; backdrop-filter: blur(4px); }
.p-info { padding: 16px; flex: 1; display: flex; flex-direction: column; }
.p-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
.p-desc { font-size: 14px; color: var(--text2); margin-bottom: 16px; flex: 1; }
.p-price-row { display: flex; justify-content: space-between; align-items: flex-end; }
.p-price { font-size: 24px; font-weight: 700; color: #fff; }
.add-btn { width: 40px; height: 40px; border-radius: 12px; background: #fff; color: #000; border: none; font-size: 24px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 10px rgba(255,255,255,0.2); }

/* OTHERS */
.gallery-scroll { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; scrollbar-width: none; }
.g-img { width: 250px; height: 160px; object-fit: cover; border-radius: var(--r); border: 1px solid var(--border); flex-shrink: 0; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
.team-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; text-align: center; }
.t-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px; border: 3px solid var(--pooja); }
.review-card { background: var(--surface); padding: 16px; border-radius: var(--r-sm); border: 1px solid var(--border); margin-bottom: 12px; }
.rating-btn { background: none; border: none; font-size: 24px; color: var(--border2); cursor: pointer; }
.rating-btn.active { color: #fbbf24; }
footer { background: var(--surface); border-top: 1px solid var(--border); padding: 40px 20px; text-align: center; }

/* CART & BILL OVERLAYS */
.cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: flex; justify-content: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(8px); }
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-drawer { width: 100%; max-width: 450px; background: var(--surface); height: 100%; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s; }
.cart-overlay.open .cart-drawer { transform: translateX(0); }
.cart-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'Yatra One', cursive; font-size: 24px; color: var(--pooja); }
.cart-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.c-item { display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.02); padding: 12px; border-radius: var(--r-sm); border: 1px solid var(--border); }
.c-ctrl { display: flex; align-items: center; gap: 12px; background: #000; padding: 4px 8px; border-radius: var(--r-sm); }
.c-btn { background: none; border: none; color: var(--text); font-size: 18px; }
.cart-footer { padding: 24px; border-top: 1px solid var(--border); background: var(--bg); display:flex; flex-direction:column; gap:12px; }
.bill-receipt { background: #fff; color: #000; padding: 24px; border-radius: var(--r); margin-bottom: 20px; }
.b-status { font-weight: 800; padding: 4px 12px; border-radius: 4px; display: inline-block; margin-top: 8px; font-size: 12px; }
.status-pending { background: #fee2e2; color: #dc2626; border: 1px solid #f87171; }
.status-approved { background: #dcfce7; color: #16a34a; border: 1px solid #4ade80; }

#toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #fff; color: #000; padding: 14px 28px; border-radius: var(--r-pill); font-weight: 700; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* DESKTOP EXCLUSIVE FLOATING CART (Hidden on mobile) */
.floating-cart { position: fixed; bottom: 30px; right: 20px; background: var(--pooja); color: #000; padding: 12px 20px; border-radius: var(--r-pill); display: flex; align-items: center; gap: 12px; z-index: 90; cursor: pointer; box-shadow: 0 10px 40px var(--pooja-l); }
.d-none { display: none !important; }

/* ── APP STYLE BOTTOM NAVIGATION (MOBILE) ── */
.mobile-bottom-nav { display: none; }

@media(max-width: 768px){
  .floating-cart { display: none !important; } /* Hide floating cart on mobile */
  .desktop-bill-btn { display: none !important; } /* Hide header bill btn */
  .container { padding-bottom: 80px; }
  footer { padding-bottom: 100px; }
  
  /* FLIPKART STYLE NAV BAR */
  .mobile-bottom-nav {
    display: flex; justify-content: space-between; align-items: center;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    z-index: 900;
  }
  .b-nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer;
    flex: 1; gap: 4px; position: relative; white-space: nowrap;
  }
  .b-nav-item.active { color: var(--pooja); }
  .b-nav-item svg { width: 24px; height: 24px; fill: currentColor; }
  .b-nav-badge {
    position: absolute; top: -6px; right: calc(50% - 20px);
    background: var(--red); color: #fff; font-size: 10px; font-weight: bold;
    border-radius: 50%; padding: 2px 5px; line-height: 1;
  }
}
</style>
</head>
<body>

<div class="marquee-bar" id="ui-marquee-wrap"><div class="marquee-content" id="ui-marquee"></div></div>

<!-- TOP NAVBAR -->
<nav class="navbar">
  <div class="brand"><span id="ui-logo-wrap"></span><div id="ui-shop-name"></div></div>

<div class="hero-banner" id="ui-hero-bg">

</div>

<main class="container">

</main>

<footer>

  <div style="font-size:15px; color:var(--text2); margin-bottom:20px;" id="ui-address"></div>
  <a id="ui-map" href="#" target="_blank" class="btn btn-outline" style="font-size:14px">Google Map पर देखें 🗺️</a>
</footer>

<!-- DESKTOP FLOATING CART -->
<div class="floating-cart hide" id="floating-cart" onclick="toggleCart()">

</div>

<script>
// 🔴 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB40aHh4-hw76BpPrKkGXnFZ46QCnHcI50",
  authDomain: "csc-center-6346b.firebaseapp.com",
  databaseURL: "https://csc-center-6346b-default-rtdb.firebaseio.com",
  projectId: "csc-center-6346b",
  storageBucket: "csc-center-6346b.firebasestorage.app",
  messagingSenderId: "937013565205",
  appId: "1:937013565205:web:e23773b558445cc5bb3b1c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

var S = {
  shopName: 'श्री राम', shopSub: 'स्टोर एवं CSC', shopLogo: '🙏', shopLogoImg: '', phone: '910000000000',
  marquee: '🎉 500₹ के राशन पर 5% छूट! आज ही आर्डर करें।', heroTitle: 'भानपुर की अपनी डिजिटल दुकान', heroSub: 'किराना, पूजा सामग्री और CSC सर्विस - सब एक जगह!', heroImg: '',
  aboutTxt: 'हम भानपुर और बुढ़ार के ग्राहकों को सबसे शुद्ध सामान और सबसे तेज़ सरकारी सेवाएँ देने के लिए प्रतिबद्ध हैं।', address: '📍 मुख्य मंदिर के सामने, भानपुर, बुढ़ार (M.P)', mapLink: '', adminSign: '',
  items: [], cart: [], orders: [], notifs: [], gallery: [], team: [], reviews: []
};

var currentFilter = 'all';
var currentRating = 0;

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function navTab(el) { document.querySelectorAll('.b-nav-item').forEach(e=>e.classList.remove('active')); el.classList.add('active'); }

function loadDataFromAPI() {
  db.ref('dukan_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      Object.assign(S, data);
      S.items = S.items || []; S.cart = S.cart || []; S.orders = S.orders || []; S.notifs = S.notifs || [];
      S.gallery = S.gallery || []; S.team = S.team || []; S.reviews = S.reviews || [];
    } else { saveDataToAPI(); }
    initUI();
  });
}
function saveDataToAPI() { db.ref('dukan_data').set(S); }

function initUI() {
  $('ui-logo-wrap').innerHTML = S.shopLogoImg ? `<img src="${S.shopLogoImg}" class="brand-icon" style="background:#fff">` : `<div class="brand-icon">${S.shopLogo}</div>`;
  $('ui-shop-name').innerHTML = `${esc(S.shopName)} <span style="color:var(--pooja)">${esc(S.shopSub)}</span>`;
  $('ui-footer-name').textContent = `${esc(S.shopName)} ${esc(S.shopSub)}`;
  $('ui-address').textContent = S.address;
  $('ui-map').href = S.mapLink || '#';
  
  if(S.marquee) { $('ui-marquee-wrap').classList.remove('hide'); $('ui-marquee').textContent = S.marquee; } else { $('ui-marquee-wrap').classList.add('hide'); }
  if(S.heroImg) { $('ui-hero-bg').style.backgroundImage = `url('${S.heroImg}')`; }
  
  $('ui-tagline').textContent = S.heroTitle; $('ui-subtag').textContent = S.heroSub; $('ui-about').textContent = S.aboutTxt;
  $('ui-notifications').innerHTML = S.notifs.map(n => `<div class="alert-box">🔔 ${esc(n)}</div>`).join('');
  
  if(S.gallery.length > 0) { $('gallery-container').classList.remove('hide'); $('ui-gallery').innerHTML = S.gallery.map(img => `<img src="${img}" class="g-img">`).join(''); } else $('gallery-container').classList.add('hide');
  if(S.team.length > 0) { $('team-container').classList.remove('hide'); $('team-grid').innerHTML = S.team.map(t => `<div class="team-card"><img src="${t.img}" class="t-img"><div style="font-size:18px;font-weight:700">${esc(t.name)}</div><div style="font-size:13px;color:var(--pooja);font-weight:600;text-transform:uppercase">${esc(t.role)}</div></div>`).join(''); } else $('team-container').classList.add('hide');
  
  renderUser(); renderReviews();
  if($('bills-overlay').classList.contains('open')) renderUserBills();
}

function renderUser() {
  let term = $('search-input').value.toLowerCase().trim();
  let filtered = currentFilter !== 'all' ? S.items.filter(i => i.type === currentFilter) : S.items;
  if(term) filtered = filtered.filter(i => i.name.toLowerCase().includes(term) || i.desc.toLowerCase().includes(term));
  
  $('product-grid').innerHTML = filtered.map(i => {
    let tag = i.type === 'csc' ? `<span class="badge" style="background:var(--csc);color:#fff">🏛️ CSC</span>` : (i.type === 'pooja' ? `<span class="badge" style="background:var(--pooja);color:#000">🛕 पूजा</span>` : `<span class="badge" style="background:var(--kirana);color:#000">🌾 किराना</span>`);
    let price = i.type === 'csc' ? (+i.govFee||0) + (+i.srvCharge||0) : i.price;
    let isOOS = (i.type !== 'csc' && i.qty <= 0);
    let btnHtml = isOOS ? `<div style="color:var(--red);font-weight:700">स्टॉक ख़त्म</div>` : `<button class="add-btn" onclick="addToCart(${i.id}, '${esc(i.name)}', ${price}, '${i.type}')">+</button>`;
    return `<div class="p-card" style="${isOOS?'opacity:0.6':''}"><div style="position:relative">${i.img?`<img src="${i.img}" class="p-img">`:`<div class="p-img-ph">📦</div>`}<div class="p-tag">${tag}</div></div><div class="p-info"><div class="p-name">${esc(i.name)}</div><div class="p-desc">${esc(i.desc)}</div><div class="p-price-row"><div><div class="p-price">₹${price}</div></div>${btnHtml}</div></div></div>`;
  }).join('') || '<div style="grid-column:1/-1;text-align:center;color:var(--text3);padding:40px;">सामान नहीं मिला।</div>';
  updateCartUI();
}

function filterItems(type, btn) { currentFilter = type; document.querySelectorAll('.cat-pill').forEach(t => t.classList.remove('on')); btn.classList.add('on'); renderUser(); }
function toggleCart() { $('cart-overlay').classList.toggle('open'); }
function addToCart(id, name, price, type) {
  let exist = S.cart.find(c => c.id === id);
  if(exist) { let item = S.items.find(i=>i.id===id); if(type !== 'csc' && exist.qty >= item.qty) return toast("स्टॉक ख़त्म!"); exist.qty++; } 
  else S.cart.push({ id, name, price, qty: 1, type });
  toast("कार्ट में जुड़ गया!"); updateCartUI();
}
function updateCartQty(id, delta) {
  let c = S.cart.find(c => c.id === id); if(!c) return;
  let newQty = c.qty + delta;
  if(newQty <= 0) S.cart = S.cart.filter(x => x.id !== id);
  else { let item = S.items.find(i=>i.id===id); if(c.type !== 'csc' && newQty > item.qty) return toast("स्टॉक ख़त्म!"); c.qty = newQty; }
  updateCartUI();
}
function updateCartUI() {
  let totItems = 0, gTotal = 0;
  $('cart-items').innerHTML = S.cart.map(c => {
    totItems += c.qty; gTotal += (c.price * c.qty);
    return `<div class="c-item"><div style="flex:1"><div style="font-weight:700;font-size:16px">${c.name}</div><div style="color:var(--pooja);font-weight:600">₹${c.price}</div></div><div class="c-ctrl"><button class="c-btn" onclick="updateCartQty(${c.id}, -1)">-</button><span style="font-weight:700;width:24px;text-align:center">${c.qty}</span><button class="c-btn" onclick="updateCartQty(${c.id}, 1)">+</button></div></div>`;
  }).join('') || '<div style="text-align:center;color:var(--text3);margin-top:20px">कार्ट खाली है।</div>';
  
  $('cart-grand-total').textContent = '₹' + gTotal;
  
  // Update desktop and mobile badges
  if(totItems > 0) { 
    $('floating-cart').classList.remove('hide'); $('fc-count').textContent = totItems + ' आइटम'; $('fc-total').textContent = '₹' + gTotal; 
    $('mob-cart-badge').classList.remove('hide'); $('mob-cart-badge').textContent = totItems;
  } else { 
    $('floating-cart').classList.add('hide'); $('mob-cart-badge').classList.add('hide'); $('cart-overlay').classList.remove('open'); 
  }
}

function sendOrder() {
  if(S.cart.length === 0) return;
  let text = "🙏 *नया आर्डर*\n-----------------------------------\n"; let total = 0;
  S.cart.forEach(c => { text += `▪️ ${c.qty}x ${c.name} (₹${c.price * c.qty})\n`; total += (c.price * c.qty); });
  text += `-----------------------------------\n*🧾 कुल बिल: ₹${total}*\n`;
  window.open(`https://wa.me/${S.phone}?text=${encodeURIComponent(text)}`);
  S.cart = []; updateCartUI(); toggleCart();
}

function requestBill() {
  if(S.cart.length === 0) return;
  let uName = prompt("बिल के लिए अपना नाम दर्ज करें:"); if(!uName) return;
  let phone = prompt("अपना मोबाइल नंबर दर्ज करें (वैकल्पिक):") || "";
  let total = S.cart.reduce((s,c) => s + (c.price * c.qty), 0);
  
  let newOrder = { id: Date.now(), date: new Date().toLocaleDateString('hi-IN'), user: uName, phone: phone, items: S.cart, total: total, status: 'pending' };
  S.orders.unshift(newOrder); 
  S.cart = []; updateCartUI(); toggleCart(); 
  saveDataToAPI(); toast("बिल रिक्वेस्ट भेज दी गई है!"); toggleBills();
}

function toggleBills() { $('bills-overlay').classList.toggle('open'); if($('bills-overlay').classList.contains('open')) renderUserBills(); }

function renderUserBills() {
  if(S.orders.length === 0) { $('bills-items').innerHTML = `<div style="text-align:center; padding:20px;">कोई बिल नहीं है।</div>`; return; }
  let shopLogoHtml = S.shopLogoImg ? `<img src="${S.shopLogoImg}" style="max-height:50px;margin-bottom:8px">` : `<div style="font-size:32px;margin-bottom:8px;">${S.shopLogo}</div>`;
  $('bills-items').innerHTML = S.orders.map(o => {
    let stat = o.status === 'pending' ? `<span class="b-status status-pending">अमान्य (Pending Approval)</span>` : `<span class="b-status status-approved">✓ मान्य (Approved)</span>`;
    let sign = (o.status === 'approved' && S.adminSign) ? `<div class="b-signature"><img src="${S.adminSign}"><p style="font-size:12px;color:#555;border-top:1px solid #ccc;display:inline-block;padding-top:4px;">Authorized Signatory</p></div>` : (o.status === 'approved' ? `<div class="b-signature"><p style="font-weight:bold; color:#16a34a">Approved by Admin</p></div>` : ``);
    return `<div class="bill-receipt"><div style="text-align:center;border-bottom:2px dashed #ccc;padding-bottom:16px;margin-bottom:16px">${shopLogoHtml}<div style="font-family:'Yatra One',cursive;font-size:24px">${esc(S.shopName)} ${esc(S.shopSub)}</div><div style="font-size:12px;color:#555">${esc(S.address)}</div></div><div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:12px"><span>बिल #${o.id.toString().slice(-5)}</span><span>${o.date}</span></div><div style="font-size:12px;color:#555;margin-bottom:16px">ग्राहक: ${esc(o.user)} ${o.phone?' | '+esc(o.phone):''}</div><div style="border-bottom:1px solid #ccc;padding-bottom:8px;margin-bottom:8px;">${o.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span>${i.qty}x ${i.name}</span><span>₹${i.price*i.qty}</span></div>`).join('')}</div><div style="display:flex;justify-content:space-between;font-weight:800;font-size:18px"><span>कुल रकम:</span><span>₹${o.total}</span></div><div style="text-align:center">${stat}</div>${sign}</div>`;
  }).join('');
}

function setRating(r) { currentRating = r; document.querySelectorAll('.rating-btn').forEach((b, i) => i<r ? b.classList.add('active') : b.classList.remove('active')); }
function submitReview() {
  let name = $('rev-name').value.trim(), text = $('rev-text').value.trim();
  if(!name || currentRating === 0 || !text) return toast("नाम, रेटिंग और राय अनिवार्य है!");
  S.reviews.push({ id: Date.now(), name, rating: currentRating, text });
  saveDataToAPI(); toast("रिव्यु जुड़ गया! धन्यवाद।");
  $('rev-name').value = ''; $('rev-text').value = ''; setRating(0);
}
function renderReviews() {
  if(S.reviews.length === 0) { $('ui-reviews-list').innerHTML = `<div style="color:var(--text3)">अभी तक कोई रिव्यु नहीं है।</div>`; return; }
  $('ui-reviews-list').innerHTML = S.reviews.map(r => `<div class="review-card"><div style="color:#fbbf24;font-size:18px;margin-bottom:4px">${"★".repeat(r.rating) + "☆".repeat(5-r.rating)}</div><div style="font-weight:700;margin-bottom:4px">${esc(r.name)}</div><div style="color:var(--text2);font-size:14px">${esc(r.text)}</div></div>`).reverse().join('');
}

loadDataFromAPI(); // App Starts Here
</script>
</body>
</html>
